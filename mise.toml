[tools]
node = "24"
pnpm = "11.9.0"
biome = "2.5.2"
uv = "0.11.26"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start the Expo mobile development server"
run = "pnpm --filter @expo-sanpo/mobile run dev"

[tasks."dev:bridge"]
description = "Start the bridge server in development mode"
run = "pnpm --filter @expo-sanpo/bridge run dev"

[tasks."tts:irodori:install"]
description = "Install Irodori-TTS dependencies with uv"
run = '''
IRODORI_TTS_DIR="${EXPO_SANPO_IRODORI_TTS_DIR:-${IRODORI_TTS_DIR:-$HOME/fork/Irodori-TTS}}"
cd "$IRODORI_TTS_DIR"
uv sync --extra cpu
'''

[tasks."dev:tts:irodori"]
description = "Start the local Irodori-TTS HTTP server"
run = '''
EXPO_SANPO_ROOT="$(pwd)"
export IRODORI_TTS_DIR="${EXPO_SANPO_IRODORI_TTS_DIR:-${IRODORI_TTS_DIR:-$HOME/fork/Irodori-TTS}}"
cd "$IRODORI_TTS_DIR"
uv run --no-sync uvicorn --app-dir "$EXPO_SANPO_ROOT/tools" irodori_tts_server:app --host "${EXPO_SANPO_IRODORI_TTS_HOST:-${IRODORI_TTS_HOST:-127.0.0.1}}" --port "${EXPO_SANPO_IRODORI_TTS_PORT:-${IRODORI_TTS_PORT:-8788}}"
'''
[tasks."dev:tts:irodori:lan"]
description = "Start the Irodori-TTS HTTP server for LAN or Tailscale clients"
run = '''
EXPO_SANPO_IRODORI_TTS_HOST="${EXPO_SANPO_IRODORI_TTS_HOST:-0.0.0.0}" mise run dev:tts:irodori
'''

[tasks.lint]
description = "Run Biome lint"
run = "biome lint ."

[tasks.format]
description = "Format files with Biome"
run = "biome format --write ."

[tasks."format:check"]
description = "Check formatting with Biome"
run = "biome format ."

[tasks.typecheck]
description = "Run TypeScript type checks"
run = "pnpm -r --if-present run typecheck"

[tasks."test:unit"]
description = "Run unit tests"
run = "pnpm -r --if-present run test:unit"

[tasks."test:component"]
description = "Run component tests"
run = "pnpm -r --if-present run test:component"

[tasks."test:integration"]
description = "Run integration tests"
run = "pnpm -r --if-present run test:integration"

[tasks."test:e2e"]
description = "Run E2E tests"
run = "pnpm -r --if-present run test:e2e"

[tasks.test]
description = "Run all tests"
depends = ["test:unit", "test:component", "test:integration", "test:e2e"]

[tasks.check]
description = "Run all local verification tasks"
depends = ["lint", "format:check", "typecheck", "test"]
